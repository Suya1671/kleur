# Scheme name: Kleur Dark
# Scheme author: Kleur Contributors
# Template author: Tinted Theming (https://github.com/tinted-theming) Modified by Suyashtnt (https://github.com/Suyashtnt)
#
# This file demonstrates all available theme configuration options for Vicinae.
# You don't need to define all of these: only override what you want to customize.
# Undefined colors will be automatically derived from core colors or inherited from base themes.
#
# Check out the full documentation at https://docs.vicinae.com/theming/getting-started

[meta]
name = "Kleur Dark"
description = "Generated by Kleur"
variant = "dark"
inherits = "vicinae-dark"

[colors.core]
accent = "#bcb0ff"
accent_foreground = "#080715"
background = "#080715"
foreground = "#ebebed"
secondary_background = "#0c0823"
border = "#14112d"

[colors.main_window]
border = "#14112d"
footer = { background = "#0c0823" }

[colors.settings_window]
border = "#14112d"

[colors.accents]
blue = "#27c7ff"
green = "#06d46e"
magenta = "#bcb0ff"
orange = "#f8aa14"
red = "#ffa192"
yellow = "#f8aa14"
cyan = "#00cec5"
purple = "#bcb0ff"

[colors.shortcut]
border = "#14112d"

[colors.text]
default = "#ebebed"
muted = "#a2a1a8"
danger = "#ffa192"
success = "#06d46e"
placeholder = "#bab9be"
selection = { background = "#bcb0ff", foreground = "#ebebed" }

[colors.text.links]
default = "#27c7ff"
visited = "#bcb0ff"

[colors.input]
border = "#14112d"
border_focus = "#bcb0ff"
border_error = "#ffa192"

[colors.button.primary]
background = "#14112d"
foreground = "#080715"
hover = { background = "#14112d" }
focus = { outline = "#bcb0ff" }

[colors.list.item.selection]
background = "#14112d"
foreground = "#dfdee1"
secondary_background = "#14112d"
secondary_foreground = "#dfdee1"

[colors.grid.item]
background = "#0c0823"
hover = { outline = "#cfced2" }
selection = { outline = "#cfced2" }

[colors.scrollbars]
background = "#14112d"

[colors.loading]
bar = "#ebebed"
spinner = "#ebebed"
