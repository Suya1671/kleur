# Scheme name: Kleur Light
# Scheme author: Kleur Contributors
# Template author: Tinted Theming (https://github.com/tinted-theming) Modified by Suyashtnt (https://github.com/Suyashtnt)
#
# This file demonstrates all available theme configuration options for Vicinae.
# You don't need to define all of these: only override what you want to customize.
# Undefined colors will be automatically derived from core colors or inherited from base themes.
#
# Check out the full documentation at https://docs.vicinae.com/theming/getting-started

[meta]
name = "Kleur Light"
description = "Generated by Kleur"
variant = "light"
inherits = "vicinae-light"

[colors.core]
accent = "#433e68"
accent_foreground = "#f0f0ff"
background = "#f0f0ff"
foreground = "#2c2c2e"
secondary_background = "#f0f0ff"
border = "#ecedfc"

[colors.main_window]
border = "#ecedfc"
footer = { background = "#f0f0ff" }

[colors.settings_window]
border = "#ecedfc"

[colors.accents]
blue = "#0f4860"
green = "#0f4d28"
magenta = "#433e68"
orange = "#5c3d06"
red = "#7b1e1b"
yellow = "#5c3d06"
cyan = "#104b47"
purple = "#433e68"

[colors.shortcut]
border = "#ecedfc"

[colors.text]
default = "#2c2c2e"
muted = "#93939b"
danger = "#7b1e1b"
success = "#0f4d28"
placeholder = "#77777d"
selection = { background = "#433e68", foreground = "#2c2c2e" }

[colors.text.links]
default = "#0f4860"
visited = "#433e68"

[colors.input]
border = "#ecedfc"
border_focus = "#433e68"
border_error = "#7b1e1b"

[colors.button.primary]
background = "#ecedfc"
foreground = "#f0f0ff"
hover = { background = "#ecedfc" }
focus = { outline = "#433e68" }

[colors.list.item.selection]
background = "#ecedfc"
foreground = "#434346"
secondary_background = "#ecedfc"
secondary_foreground = "#434346"

[colors.grid.item]
background = "#f0f0ff"
hover = { outline = "#5c5c61" }
selection = { outline = "#5c5c61" }

[colors.scrollbars]
background = "#ecedfc"

[colors.loading]
bar = "#2c2c2e"
spinner = "#2c2c2e"
